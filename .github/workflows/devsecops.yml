name: DevSecOps

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE_TYPE: mit

  dependency-scan:
    name: Dependency Audit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - ecosystem: npm
            path: .
            lock: package-lock.json
          - ecosystem: cargo
            path: src-tauri
            lock: Cargo.lock

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        if: matrix.ecosystem == 'npm'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.lock }}

      - name: Setup Rust
        if: matrix.ecosystem == 'cargo'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: npm audit
        if: matrix.ecosystem == 'npm'
        run: npm audit --audit-level=high

      - name: cargo audit
        if: matrix.ecosystem == 'cargo'
        working-directory: ./src-tauri
        run: |
          cargo install cargo-audit 2>/dev/null || true
          cargo audit || true

  sast-frontend:
    name: SAST (Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: |
            p/security-audit
            p/secrets
            p/javascript-audit
            p/typescript-audit
          paths: src/
        continue-on-error: true

  sast-rust:
    name: SAST (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Run clippy
        working-directory: ./src-tauri
        run: cargo clippy -- -D warnings
        continue-on-error: true

      - name: Run rustsec
        run: |
          cargo install cargo-audit 2>/dev/null || true
          cargo audit || true
        continue-on-error: true

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [secret-scan, dependency-scan]
    if: always()
    steps:
      - name: Check failures
        run: |
          FAILED=$(jq -r '.status' <<< '${{ toJSON(needs) }}' | grep -c 'failure' 2>/dev/null || echo "0")
          if [ "$FAILED" -gt "0" ]; then
            echo "Security issues detected."
            exit 1
          fi
          echo "All security checks passed ✓"
