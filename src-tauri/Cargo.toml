[package]
name = "hearth-desktop"
version = "0.1.0"
description = "Native desktop client for Hearth chat platform"
authors = ["Greg Hendrickson"]
license = "MIT"
repository = "https://github.com/greghendrickson/hearth-desktop"
edition = "2021"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon", "image-png", "devtools"] }
tauri-plugin-notification = "2"
tauri-plugin-autostart = "2"
tauri-plugin-updater = "2"
tauri-plugin-store = "2"
tauri-plugin-deep-link = "2"
tauri-plugin-clipboard-manager = "2"
tauri-plugin-window-state = "2"
tauri-plugin-single-instance = "2"
tauri-plugin-global-shortcut = "2"
# Pin dependencies for compatibility
aligned = "=0.4.2"
dlopen2_derive = "=0.4.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
urlencoding = "2"
open = "5"
opener = "0.7"
log = "0.4"
lazy_static = "1.5"
once_cell = "1.19"
chrono = { version = "0.4", features = ["serde"] }
rand = "0.8"
png = "0.17"
base64 = "0.22"
arboard = "3.4"
uuid = { version = "1.10", features = ["v4"] }
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "gif", "webp", "bmp", "ico"] }
sysinfo = "0.33"
reqwest = { version = "0.12", features = ["json"] }
url = "2"
regex = "1"
futures = "0.3"
rusqlite = { version = "0.32", features = ["bundled", "vtab"] }
dirs = "5"
zip = { version = "2", features = ["deflate"] }
libc = "0.2"
nnnoiseless = "0.5"

[target.'cfg(target_os = "windows")'.dependencies]
windows-sys = { version = "0.52", features = ["Win32_System_Power", "Win32_Graphics_Gdi", "Win32_UI_WindowsAndMessaging"] }

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
